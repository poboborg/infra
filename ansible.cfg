[defaults]
#inventory = ./hosts
host_key_checking = false
fact_caching = jsonfile
fact_caching_connection = /tmp/facts_cache
library = library
gather_facts = true
ainterpreter_python = usr/bin/python3.12
private_key_file = ~/.ssh/id_ed25519
log_path = ~/Linuxfactory/infra/ansible.log

[connection]
pipelining = True

[ssh_connection]
pipelining = True
